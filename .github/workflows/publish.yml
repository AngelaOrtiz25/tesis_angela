name: Publicar Tesis Quarto (con PDF)

on:
  push:
    branches: [master]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar LaTeX (para PDF)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-base \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-latex-extra \
            texlive-xetex \
            texlive-luatex \
            lmodern
        # Esto instala todo lo necesario para generar PDFs con Quarto

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render (genera HTML y PDF)
        run: quarto render

      - name: Deploy a GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site